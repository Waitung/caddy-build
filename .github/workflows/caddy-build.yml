name: Caddy Build

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      version:
        description: "版本号：new/latest/tag(例:v2.0.1)"
        required: true
        default: "new"

      goos:
        description: "系统"
        required: true
        default: "linux"
        type: choice
        options:
          - linux
          - windows

      goarch:
        description: "架构"
        required: true
        default: "amd64"
        type: choice
        options:
          - amd64
          - arm64

      upload-server:
        description: "上传到服务器"
        type: boolean
        default: false
        
      cloudflare:
        description: "Cloudflare DNS 插件：caddy-dns/cloudflare"
        type: boolean
        default: true

      webdav:
        description: "WebDAV 插件：mholt/caddy-webdav"
        type: boolean
        default: true

      replace_response:
        description: "Replace Response 插件：caddyserver/replace-response"
        type: boolean
        default: true

      l4:
        description: "Layer4 插件：mholt/caddy-l4"
        type: boolean
        default: true

      upload:
        description: "Upload 插件：git001/caddyv2-upload"
        type: boolean
        default: true

      exec:
        description: "Exec 插件：abiosoft/caddy-exec"
        type: boolean
        default: false

      extra_plugins:
        description: "额外插件（空格分隔）"
        required: false
        default: ""

jobs:
  caddy-build:
    name: Caddy ${{ inputs.goos }} ${{ inputs.goarch }} - ${{ inputs.version }}
    runs-on: ubuntu-latest

    steps:
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true
          cache: false

      - name: Install xcaddy
        run: |
          go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest

      - name: Build Caddy
        run: |
          version="${{ inputs.version }}"
          
          if [[ "$version" == "new" ]]; then
            version=$(
              curl -fsSL https://api.github.com/repos/caddyserver/caddy/releases \
              | grep '"tag_name"' \
              | sed -n '1p' \
              | cut -d '"' -f4
            )
          fi

          goos="${{ inputs.goos }}"
          goarch="${{ inputs.goarch }}"

          plugins=()
          ${{ inputs.cloudflare }} && plugins+=(caddy-dns/cloudflare)
          ${{ inputs.webdav }} && plugins+=(mholt/caddy-webdav)
          ${{ inputs.replace_response }} && plugins+=(caddyserver/replace-response)
          ${{ inputs.l4 }} && plugins+=(mholt/caddy-l4)
          ${{ inputs.upload }} && plugins+=(git001/caddyv2-upload)
          ${{ inputs.exec }} && plugins+=(abiosoft/caddy-exec)
          read -ra extra <<< "${{ inputs.extra_plugins }}"
          plugins+=(${{ inputs.extra_plugins }})

          mkdir -p ~/build-caddy/bin
          cd ~/build-caddy

          if [[ "$goos" == "windows" ]]; then
            output="bin/caddy.exe"
          else
            output="bin/caddy"
          fi

          CGO_ENABLED=0 \
          GOOS="$goos" \
          GOARCH="$goarch" \
          xcaddy build \
            "$version" \
            --output "$output" \
            ${plugins[@]/#/--with github.com/}

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          path: ~/build-caddy/bin/*
          archive: false

      - name: Upload Private
        if: ${{ inputs.upload-server }}
        env:
          UPLOAD_TOKEN: ${{ secrets.UPLOAD_TOKEN }}
          UPLOAD_URL: ${{ secrets.UPLOAD_URL }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_ID: ${{ secrets.TG_ID }}
          DL_URL: ${{ secrets.DL_URL }}
        run: |
          file="~/build-caddy/bin/*"
          name=$(basename "$file")

          status=$(
            curl \
              -fsSL \
              -u "${UPLOAD_TOKEN}" \
              -F "file=@${file}" \
              -o /dev/null \
              -w "%{http_code}" \
              "${UPLOAD_URL}"
          )

          if [[ "$status" =~ ^2 ]]; then
            text=$'\U00002705'" \`${name}\` 已经上传成功"
            text+="%0A———————————%0A"
            text+=$'\U0001F440'" [查看 Github Action]($GITHUB_SERVER_URL/$GITHUB_SERVER_REPOSITORY/actions/runs/$GITHUB_RUN_ID)"
            text+="%0A———————————%0A"
            text+=$'\U0001F517'" ${DL_URL}"

            curl -fsSL \
              -X POST \
              "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d "chat_id=${TG_ID}" \
              -d "text=${text}" \
              -d "parse_mode=Markdown" \
              -d "disable_web_page_preview=true" \
              > /dev/null
          fi
